<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña - MINIFUN</title>
    <link rel="stylesheet" href="/css/pages.css">
</head>
<body class="theme-pink">
    <main class="container">
        <div class="logo">🎮</div>

        <h1>Nueva Contraseña</h1>

        <p class="subtitle">Ingresa tu nueva contraseña para recuperar el acceso a tu cuenta.</p>

        <div id="errorDiv" class="error-message" style="display: none;"></div>

        <form id="resetForm" action="/api/auth/reset-password" method="POST">
            <input type="hidden" name="token" id="tokenInput">

            <div class="form-group">
                <label for="password">Nueva Contraseña</label>
                <input type="password" id="password" name="password" required minlength="6" placeholder="Mínimo 6 caracteres">
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmar Contraseña</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6" placeholder="Repite tu contraseña">
            </div>

            <div id="validationError" class="validation-error" style="display: none;"></div>

            <button type="submit" class="btn">Cambiar Contraseña</button>
        </form>
    </main>

    <footer>
        <p>&copy; <span id="year"></span> MINIFUN - Aprende jugando</p>
    </footer>

    <script>
        // Get params from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const error = urlParams.get('error');

        // Fill token input
        if (token) {
            document.getElementById('tokenInput').value = token;
        }

        // Show error if present
        if (error) {
            const errorDiv = document.getElementById('errorDiv');
            errorDiv.textContent = decodeURIComponent(error);
            errorDiv.style.display = 'block';
        }

        // Set current year
        document.getElementById('year').textContent = new Date().getFullYear();

        // Form validation
        document.getElementById('resetForm').addEventListener('submit', function(e) {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const validationError = document.getElementById('validationError');

            // Reset validation error
            validationError.style.display = 'none';

            // Check minimum length
            if (password.length < 6) {
                e.preventDefault();
                validationError.textContent = 'La contraseña debe tener al menos 6 caracteres.';
                validationError.style.display = 'block';
                return;
            }

            // Check passwords match
            if (password !== confirmPassword) {
                e.preventDefault();
                validationError.textContent = 'Las contraseñas no coinciden.';
                validationError.style.display = 'block';
                return;
            }
        });
    </script>
</body>
</html>
